# Supabase free-tier projects pause after ~7 days with no activity, which
# would break likes and playlists. This pings a harmless read RPC every few
# days to keep the kexp-player project warm. The publishable key is public by
# design (it already ships in the site), so it lives inline here, not a secret.
name: Keep Supabase warm

on:
  schedule:
    - cron: '17 9 */3 * *' # every 3 days, 09:17 UTC
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the database via a read-only RPC
        run: |
          curl -fsS -X POST \
            'https://jodgbwwnbrotuceanghk.supabase.co/rest/v1/rpc/song_like_count' \
            -H 'apikey: sb_publishable_bbC4VBdlBYCn_9VAMgWp-g_qftjC2FL' \
            -H 'Content-Type: application/json' \
            -d '{"p_artist":"__keepalive__","p_song":"__keepalive__"}' \
            && echo "kexp-player pinged OK"
