<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEXP Live — 90.3 FM Seattle</title>
  <meta name="description"
    content="Stream Seattle's KEXP 90.3 FM live. See what's playing, heart the songs you love, and build a playlist with album art and DJ notes.">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="KEXP Live — 90.3 FM Seattle">
  <meta property="og:description"
    content="The best radio station on earth, in one tag. Stream live, like songs, keep a playlist.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://davidpuerto.com/kexp/">
  <meta property="og:image" content="https://davidpuerto.com/kexp/screenshots/player.png">
  <link rel="icon" href="assets/images/svg/favicon.svg" sizes="any" type="image/svg+xml">
  <link rel="stylesheet" href="global.css" />
  <style>
    /* The component is dark inside its own box — the page behind it (the
       strip under the fixed footer) must match, or it shows up white. */
    body {
      background: #0a0a0a;
    }

    /* Reserve room for the fixed footer so it never overlaps the player. */
    audio-player {
      display: block;
      height: calc(100% - 36px);
    }

    .siteFooter {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 11px;
      color: #9a9a9f;
      z-index: 1;
    }

    .siteFooter a {
      color: #9a9a9f;
      text-decoration: none;
      border-bottom: 1px dotted rgb(255 255 255 / 30%);
      padding-bottom: 1px;
    }

    .siteFooter a:hover {
      color: #f5f5f5;
      border-bottom-color: currentColor;
    }

    .siteFooter span {
      margin: 0 8px;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <audio-player
    backend-url="https://jodgbwwnbrotuceanghk.supabase.co"
    backend-key="sb_publishable_bbC4VBdlBYCn_9VAMgWp-g_qftjC2FL">
  </audio-player>
  <script type="module" src="./audioPlayer.js"></script>
  <footer class="siteFooter">
    <a href="https://github.com/dapinitial/KEXP-WebComponent" target="_blank" rel="noopener">GitHub</a>
    <span>·</span>
    <a href="https://github.com/dapinitial/KEXP-WebComponent#the-browser-extension" target="_blank" rel="noopener">Get the browser extension</a>
    <span>·</span>
    <a href="https://kexp.org/donate" target="_blank" rel="noopener">Donate to KEXP 💖</a>
  </footer>
</body>

</html>
