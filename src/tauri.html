<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>KEXP Player</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #0a0a0a;
      overflow: hidden;
    }

    audio-player {
      display: block;
      height: 100%;
    }

    .closeButton {
      position: fixed;
      top: 6px;
      right: 6px;
      z-index: 10;
      width: 22px;
      height: 22px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: rgb(255 255 255 / 8%);
      color: #9a9a9f;
      font: 13px/22px system-ui, sans-serif;
      cursor: pointer;
    }

    .closeButton:hover {
      background: rgb(255 255 255 / 18%);
      color: #f5f5f5;
    }
  </style>
</head>

<body>
  <audio-player
    backend-url="https://jodgbwwnbrotuceanghk.supabase.co"
    backend-key="sb_publishable_bbC4VBdlBYCn_9VAMgWp-g_qftjC2FL">
  </audio-player>
  <button class="closeButton" type="button" aria-label="Close window" title="Close">✕</button>
  <script type="module">
    import './audioPlayer.js';

    // Tauri-only glue: tell the tray about play state (it animates the EQ
    // bars while we're on air) and let the ✕ dismiss the dropdown. The
    // stream keeps playing — hiding the window doesn't touch the webview.
    const tauri = window.__TAURI__;
    if (tauri) {
      const player = document.querySelector('audio-player');
      player.engine.addEventListener('playing-changed', (e) => {
        tauri.event.emit('playing-changed', e.detail);
      });
      document.querySelector('.closeButton').addEventListener('click', () => {
        tauri.window.getCurrentWindow().hide();
      });
      // ⌘Q quits the whole app, like any Mac app (Rust listens for this).
      document.addEventListener('keydown', (e) => {
        if (e.metaKey && e.key === 'q') tauri.event.emit('kexp:quit');
      });
    }
  </script>
</body>

</html>
